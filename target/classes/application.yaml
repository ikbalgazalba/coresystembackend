# All secret/URL values are externalized to environment variables (§D-002).
# There are NO defaults here on purpose: if an env var is unset the app fails
# fast at startup (Could not resolve placeholder). Provide values via .env
# (see .env.example, gitignored) or real environment config.
spring:
  application:
    name: coresystembackend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

coresystem:
  app:
    # No default — MUST be set via JWT_SECRET env var (§D-002).
    # Base64-encoded, >=64 bytes for HS512 (jjwt WeakKeyException guard).
    jwtSecret: ${JWT_SECRET}
    jwtExpirationMs: 86400000
  ldap:
    # All values MUST be set via env var (§D-002). See .env.example.
    urlToken: ${LDAP_URL_TOKEN}
    urlVerifyPassword: ${LDAP_URL_VERIFY_PASSWORD}
    clientId: ${LDAP_CLIENT_ID}
    clientSecret: ${LDAP_CLIENT_SECRET}
    username: ${LDAP_USERNAME}
    password: ${LDAP_PASSWORD}
    partnerId: ${LDAP_PARTNER_ID}
    channelId: ${LDAP_CHANNEL_ID}
    host: ${LDAP_HOST}
    aesKey: ${LDAP_AES_KEY}
