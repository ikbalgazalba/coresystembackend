# Prod profile — container deployment. Overrides ONLY profile-specific keys.
# Base application.yaml (secret ${VAR} placeholders, fail-fast) is unchanged.
# CORS origins come from env (compose U-004 sets CORS_ALLOWED_ORIGINS); no hardcoded prod origin.
# SDD-PROVENANCE: U-005 | vault: .mega-sdd/vaults/api-platform | Spring profile prod
coresystem:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:7001}
springdoc:
  swagger-ui:
    enabled: false   # OQ-AP-5 ACCEPT — UI off in prod; spec still at /v3/api-docs
management:
  endpoints:
    web:
      exposure:
        include: health
server:
  port: ${SERVER_PORT:7001}   # OQ-AP-2 — explicit env-driven port, default 7001
