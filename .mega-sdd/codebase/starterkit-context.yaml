# Pack-driven patterns — authoritative conventions for NEW code (from spring.md pack).
# These are NOT detections; they are the starterkit's intended conventions.
patterns:
  file_location:
    controllers: "src/main/java/<pkg>/controller/"
    services: "src/main/java/<pkg>/service/"
    repositories: "src/main/java/<pkg>/repository/"
    entities: "src/main/java/<pkg>/entity/"
    dtos: "src/main/java/<pkg>/dto/"
    config: "src/main/java/<pkg>/config/"
    exception_handlers: "src/main/java/<pkg>/exception/"
    security_config: "src/main/java/<pkg>/config/SecurityConfig.java"
    application_properties: "src/main/resources/application.yaml"
    tests: "src/test/java/<pkg>/"
  naming:
    class_case: PascalCase
    method_case: camelCase
    controller_suffix: "Controller"
    service_suffix: "Service"
    repository_suffix: "Repository"
    entity: "PascalCase singular noun (@Entity + @Id)"
    dto_suffix: "Dto | Request | Response"
    config_suffix: "Config"
    test_suffix: "Test"
    db_column: snake_case
    db_table: snake_case plural
  idioms:
    - "Constructor injection over @Autowired field injection (omit @Autowired on single-ctor)"
    - "Layered: @RestController -> @Service -> @Repository"
    - "DTOs at API boundaries; never expose @Entity in REST responses"
    - "Spring Data JPA: extend JpaRepository<Entity, ID>"
    - "SecurityFilterChain bean (NOT WebSecurityConfigurerAdapter — removed in Spring 6)"
    - "@Transactional at service layer for multi-step writes"
    - "@RestControllerAdvice for global exception handling"
  security_idioms:
    input_validation: "Bean Validation @Valid/@Validated on @RequestBody DTOs"
    password_hashing: "BCryptPasswordEncoder via PasswordEncoderFactories.createDelegatingPasswordEncoder()"
    authn_point: "SecurityFilterChain bean + authorizeHttpRequests + @EnableMethodSecurity"
    secrets: "Externalize via env vars / placeholders in application.yaml; never commit literals"
  testing:
    runner: "./mvnw test"
    framework: "JUnit 5 (Jupiter)"
    slice_annotations: ["@SpringBootTest", "@WebMvcTest", "@DataJpaTest", "@MockBean"]
    http_layer: "MockMvc / TestRestTemplate"
    mocking: "Mockito (@Mock, @InjectMocks, @ExtendWith(MockitoExtension.class))"
  version_caveat: "Pack targets Boot 3.x; project is Boot 4.1.1-SNAPSHOT. MUST use jakarta.* (not javax.*) and Spring Security 7.x APIs. Pack structural idioms remain valid."

reuse_index:
  helpers: []
  model_api: []
  services: []
  commands: []
  reason: "Skeleton has no reusable code yet."

partial: false
partial_slices: []
